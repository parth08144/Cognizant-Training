# ============================================================
# application.properties — Spring Boot Configuration File
# ============================================================
# Location : src/main/resources/
# Purpose  : Externalises application configuration so you can
#            change behaviour without recompiling the code.
#            Spring Boot reads this file automatically at startup.
# ============================================================

# --- Server Configuration ---
# Hands On 3: port changed to 8083 to match the sample URL:
#   http://localhost:8083/hello
# Change this if 8083 is already in use on your machine.
server.port=8083

# Troubleshooting: if port 8083 is busy, try another free port:
# server.port=8084

# Optional: context path prefix for all endpoints
# server.servlet.context-path=/api

# --- Application Name ---
# Used in logs and by Spring Cloud service discovery.
spring.application.name=spring-learn

# --- Logging Configuration ---
# Root log level: ERROR | WARN | INFO | DEBUG | TRACE
logging.level.root=INFO

# Set DEBUG level for our own package to see detailed logs
logging.level.com.cognizant=DEBUG

# Log file output (optional — logs to console by default)
# logging.file.name=logs/spring-learn.log

# --- DevTools (automatically applied when devtools JAR is present) ---
# spring.devtools.restart.enabled=true   (default when DevTools on classpath)
# spring.devtools.livereload.enabled=true (default)
