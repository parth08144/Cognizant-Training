# Hands on 1: Create a Spring Web Project using Maven
server.port=8083

logging.level.org.springframework=info
logging.level.com.cognizant.springlearn=debug
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n

# JWT-handson: secret key + expiry used by JwtUtil (kept simple for the hands-on;
# in a real project move this to an environment variable / secrets manager)
jwt.secret=SpringLearnJwtHandsOnSecretKeyForTrainingPurposesOnly123456
jwt.expiration-ms=1200000
