# Spring Framework and application log levels
# 'info' means general operational messages
logging.level.org.springframework=info
# 'debug' means detailed messages from our application package
logging.level.com.cognizant=debug

# Hibernate logs
# 'trace' shows the actual SQL queries executed by Hibernate
logging.level.org.hibernate.SQL=trace
# 'trace' shows the bind parameter values used in SQL queries
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern for the console output
# %d{dd-MM-yy}       -> date in day-month-year format
# %d{HH:mm:ss.SSS}   -> time with milliseconds
# %-20.20thread       -> thread name, padded/truncated to 20 chars
# %5p                 -> log level (ERROR, WARN, INFO, DEBUG, TRACE)
# %-25.25logger{25}   -> logger name, max 25 chars
# %25M                -> method name, padded to 25 chars
# %4L                 -> line number, padded to 4 chars
# %m%n                -> log message + newline
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# -----------------------------------------------
# Database Configuration (MySQL)
# -----------------------------------------------
# Use the updated driver class name for MySQL 8.x
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JDBC URL pointing to the 'ormlearn' schema on localhost
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn

# Database credentials
# ⚠️  IMPORTANT: Change the password below to YOUR actual MySQL root password.
# Common passwords to try:
#   - The password you set when you installed MySQL 8.0
#   - Leave blank (spring.datasource.password=) if you chose no password
#   - "password", "mysql", "admin" are also common choices
#
# To reset your MySQL root password, see the README troubleshooting section.
spring.datasource.username=root
spring.datasource.password=root

# -----------------------------------------------
# Hibernate / JPA Configuration
# -----------------------------------------------
# 'validate' -> Hibernate validates the schema on startup but does NOT modify it.
#   - Use 'create' to auto-create tables (drops existing data each run)
#   - Use 'update' to auto-update schema without dropping data
#   - Use 'none'   to skip schema management entirely
spring.jpa.hibernate.ddl-auto=validate

# MySQL5Dialect generates SQL compatible with MySQL 5.x and 8.x
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
